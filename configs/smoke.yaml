# Smoke config: 2 epochs of resnet1d_small to verify the pipeline runs.
# Not a real model — just for proving the wiring works on real data.

data:
  data_dir: data/raw/ptbxl
  sampling_rate: 100
  apply_filter: true
  apply_normalisation: true

model:
  name: resnet1d_small
  n_classes: 5
  n_leads: 12

training:
  epochs: 2
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  grad_clip: 1.0
  seed: 42
  device: auto
  num_workers: 0
  checkpoint_dir: checkpoints/smoke
  use_class_weighting: true